services:
  web:
    build: .
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - IN_DOCKER=true
      - PYTHONPATH=/app
      - DJANGO_SETTINGS_MODULE=config.settings
      - REDIS_HOST=redis
      - RABBITMQ_HOST=rabbitmq

  redis:
    image: redis:7-alpine
    ports:
      - "${REDIS_PORT}:6379"

  rabbitmq:
    image: rabbitmq:3-management-alpine
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD}

  celery_worker:
    build: .
    command: celery -A config worker --loglevel=info --pool=solo --concurrency=10
    volumes:
      - .:/app
    env_file:
      - .env
    environment:
      - IN_DOCKER=true
      - REDIS_HOST=redis
      - RABBITMQ_HOST=rabbitmq
      - PYTHONPATH=/app
      - DJANGO_SETTINGS_MODULE=config.settings
    depends_on:
      - web
      - redis
      - rabbitmq
    restart: unless-stopped

  celery_beat:
    build: .
    command: celery -A config beat --loglevel=info
    volumes:
      - .:/app
    env_file:
      - .env
    environment:
      - IN_DOCKER=true
      - REDIS_HOST=redis
      - RABBITMQ_HOST=rabbitmq
      - PYTHONPATH=/app
      - DJANGO_SETTINGS_MODULE=config.settings
    depends_on:
      - web
      - redis
      - rabbitmq
    restart: unless-stopped

  flower:
    build: .
    command: celery -A config flower --port=5555
    ports:
      - "5555:5555"
    volumes:
      - .:/app
    env_file:
      - .env
    environment:
      - IN_DOCKER=true
      - REDIS_HOST=redis
      - RABBITMQ_HOST=rabbitmq
      - PYTHONPATH=/app
      - DJANGO_SETTINGS_MODULE=config.settings
    depends_on:
      - web
      - redis
      - rabbitmq
      - celery_worker
      - celery_beat
    restart: unless-stopped
